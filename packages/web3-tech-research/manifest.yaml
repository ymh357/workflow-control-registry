name: web3-tech-research
version: 2.1.0
type: pipeline
description: >
  Research-driven pipeline for Web3 protocol selection, competitive analysis, and technical feasibility assessment.
  Enforces primary-source-first research and independent fact-checking to prevent the "echo chamber" anti-pattern.
  On-chain verification runs BEFORE content production.
  Supports two modes: "full" (product optimization with benchmarks, pain points, solution design) and "explore"
  (greenfield research with lightweight landscape analysis).
author: workflow-control
