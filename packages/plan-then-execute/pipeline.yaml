name: Plan Then Execute
description: >
  Enforces brainstorm -> plan -> execute -> verify workflow.
  Design must be approved before implementation. All work verified before completion.
engine: claude
use_cases:
  - Feature implementation with design review
  - Refactoring with planning phase
  - Any multi-file change that benefits from upfront design

display:
  title_path: design.title
  completion_summary_path: verification.summary

invariants:
  - "NO implementation code WITHOUT an approved design document"
  - "NO completion claim WITHOUT fresh verification evidence"

stages:
  - name: brainstorm
    type: agent
    interactive: true
    thinking:
      type: enabled
    effort: high
    max_turns: 40
    max_budget_usd: 3
    runtime:
      engine: llm
      system_prompt: brainstorm
      writes:
        - design
    outputs:
      design:
        type: object
        label: Design Document
        fields:
          - key: title
            type: string
            description: Feature/task title
          - key: approach
            type: markdown
            description: Chosen approach with rationale
          - key: alternatives
            type: markdown
            description: Alternatives considered and why they were rejected
          - key: fileMap
            type: markdown
            description: Files to create or modify with responsibilities
          - key: risks
            type: string[]
            description: Identified risks and mitigations
          - key: summary
            type: markdown
            description: Design summary for human review

  - name: reviewDesign
    type: human_confirm
    runtime:
      engine: human_gate
      on_reject_to: brainstorm
      max_feedback_loops: 3

  - name: writePlan
    type: agent
    thinking:
      type: enabled
    effort: high
    max_turns: 50
    max_budget_usd: 4
    runtime:
      engine: llm
      system_prompt: write-plan
      reads:
        design: design
      writes:
        - plan
    outputs:
      plan:
        type: object
        label: Implementation Plan
        fields:
          - key: tasks
            type: object[]
            description: Ordered list of implementation tasks with steps
            fields:
              - key: id
                type: string
                description: Task identifier (task-1, task-2, etc.)
              - key: title
                type: string
                description: Task title
              - key: files
                type: string[]
                description: Files this task touches
              - key: steps
                type: string[]
                description: Ordered implementation steps
          - key: taskCount
            type: number
            description: Total number of tasks

  - name: reviewPlan
    type: human_confirm
    runtime:
      engine: human_gate
      on_reject_to: writePlan
      max_feedback_loops: 3

  - name: execute
    type: agent
    effort: high
    max_turns: 100
    max_budget_usd: 10
    permission_mode: bypassPermissions
    verify_commands:
      - "npx tsc --noEmit 2>&1 || true"
    verify_policy: warn
    runtime:
      engine: llm
      system_prompt: execute-task
      reads:
        design: design
        plan: plan
      writes:
        - implementation
      retry:
        max_retries: 2
        back_to: execute
    outputs:
      implementation:
        type: object
        label: Implementation Result
        fields:
          - key: completedTasks
            type: string[]
            description: List of completed task IDs
          - key: filesChanged
            type: string[]
            description: All files created or modified
          - key: passed
            type: boolean
            description: Whether all tasks completed successfully
          - key: blockers
            type: string[]
            description: Any blocking issues encountered

  - name: verify
    type: agent
    effort: medium
    max_turns: 30
    max_budget_usd: 2
    permission_mode: acceptEdits
    verify_commands:
      - "npx tsc --noEmit"
    verify_policy: must_pass
    runtime:
      engine: llm
      system_prompt: verify-completion
      reads:
        design: design
        plan: plan
        implementation: implementation
      writes:
        - verification
      retry:
        max_retries: 1
        back_to: execute
    outputs:
      verification:
        type: object
        label: Verification
        fields:
          - key: passed
            type: boolean
            description: Whether all checks passed
          - key: checksRun
            type: string[]
            description: Verification commands executed
          - key: summary
            type: markdown
            description: Verification summary
          - key: blockers
            type: string[]
            description: Remaining issues (empty if passed)
