# Auto-format TypeScript files after Write or Edit
# Injected into worktree .claude/settings.json as a PostToolUse hook.
# The "script" field is written to .claude/hooks/{name}.sh and made executable.

event: PostToolUse
matcher: "Write|Edit"
type: command
timeout: 30
statusMessage: "Formatting..."
script: |
  #!/bin/bash
  INPUT=$(cat)
  FILE_PATH=$(echo "$INPUT" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{console.log(JSON.parse(d).tool_input.file_path)}catch{}})" 2>/dev/null)
  if [ -n "$FILE_PATH" ] && [[ "$FILE_PATH" =~ \.(ts|tsx|js|jsx|css)$ ]]; then
    npx prettier --write "$FILE_PATH" 2>/dev/null
    npx eslint --fix "$FILE_PATH" 2>/dev/null || true
  fi
